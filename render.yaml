# Albasirtour — backend API on Render
# Frontend: deploy frontend/ folder separately on Vercel
# Database: MongoDB Atlas (free tier) — set MONGO_URL in Render dashboard

services:
  - type: web
    name: albasirtour-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: albasirtour
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_PHONE
        value: "+998900000001"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@albasirtour.com
      - key: DEMO_USER_PHONE
        value: "+998900000002"
      - key: DEMO_USER_EMAIL
        value: user@albasirtour.com
      - key: DEMO_USER_PASSWORD
        sync: false
