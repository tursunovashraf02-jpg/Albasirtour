# Albasirtour — Fullstack (Backend + Frontend) on Render
# Database: MongoDB Atlas — set MONGO_URL in Render dashboard

services:
  # 1. API (Backend) Servisi
  - type: web
    name: albasirtour-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: albasirtour
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_PHONE
        value: "+998900000001"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@albasirtour.com

  # 2. Sayt (Frontend) Servisi
  - type: web
    name: albasirtour-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: "" # Agar frontend oddiy HTML/CSS/JS bo'lsa shunday qoladi. Agar React/Vite bo'lsa "npm install && npm run build" yozing
    publishPath: "." # Agar React bo'lsa "dist" yoki "build" deb o'zgartiring